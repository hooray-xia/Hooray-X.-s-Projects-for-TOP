		document.body.appendChild(renderer.domElement);

		function makePlat(c) {
			const isGoal = c.goal || false;
			const platColor = isGoal ? new THREE.Color().setRGB(255 / 255, 170 / 255, 0 / 255) : new THREE.Color().setRGB(68 / 255, 170 / 255, 68 / 255);

			const mesh = new THREE.Mesh(
				new THREE.BoxGeometry(c.w, c.h, c.d),
				new THREE.MeshLambertMaterial({
					color: platColor
				})
			);
			mesh.position.set(c.x, c.y, c.z);
			mesh.receiveShadow = true;
			mesh.castShadow = true;
			scene.add(mesh);
			platforms.push({
				mesh,
				...c
			});
		}

		function makeSpike(c) {
			const mesh = new THREE.Mesh(
				new THREE.ConeGeometry(0.8, 1.8, 8),
				new THREE.MeshLambertMaterial({
					color: new THREE.Color().setRGB(238 / 255, 238 / 255, 238 / 255)
				})
			);
			mesh.position.set(c.x, c.y + 0.4, c.z);
			mesh.castShadow = true;
			mesh.receiveShadow = true;
			scene.add(mesh);
			hazards.push({
				mesh,
				x: c.x,
				y: c.y + 0.4,
				z: c.z
			});
		}

		function makeTramp(c) {
			const mesh = new THREE.Mesh(
				new THREE.BoxGeometry(c.w, c.h, c.d),
				new THREE.MeshLambertMaterial({
					color: new THREE.Color().setRGB(0 / 255, 229 / 255, 255 / 255)
				})
			);
			mesh.position.set(c.x, c.y, c.z);
			mesh.receiveShadow = true;
			mesh.castShadow = true;
			scene.add(mesh);
			trampolines.push({
				mesh,
				...c
			});
		}

		function makeSign(c) {
			const mesh = new THREE.Mesh(
				new THREE.BoxGeometry(1.5, 1, 0.2),
				new THREE.MeshLambertMaterial({
					color: 0x8b5a2b
				})
			);
			mesh.position.set(c.x, c.y, c.z);
			scene.add(mesh);
			signs.push({
				mesh,
				...c
			});
		}

		function makeCheckpoint(c) {
			const mesh = new THREE.Mesh(
				new THREE.BoxGeometry(c.w, c.h, c.d),
				new THREE.MeshLambertMaterial({
					color: 0xda70d6
				})
			);
			mesh.position.set(c.x, c.y, c.z);
			scene.add(mesh);
			checkpoints.push({
				mesh,
				...c
			});
		}

		function buildStage(index) {
			platforms.forEach(p => scene.remove(p.mesh));
			hazards.forEach(h => scene.remove(h.mesh));
			trampolines.forEach(t => scene.remove(t.mesh));
			signs.forEach(s => scene.remove(s.mesh));
			checkpoints.forEach(chk => scene.remove(chk.mesh));

			platforms.length = hazards.length = trampolines.length = signs.length = checkpoints.length = 0;

			levels[index].forEach(obj => {
				if (obj.type === 'plat') makePlat(obj);
				if (obj.type === 'spike') makeSpike(obj);
				if (obj.type === 'tramp') makeTramp(obj);
				if (obj.type === 'sign') makeSign(obj);
				if (obj.type === 'checkpoint') makeCheckpoint(obj);
			});

			player.position.set(0, 3, 0);
			velocity.set(0, 0, 0);

			camera.position.set(0, 3.6, 0);
			camera.rotation.set(0, Math.PI, 0);

			document.getElementById('level-display').innerText = "Level: " + (index + 1);
		}

		const velocity = new THREE.Vector3();
		const gravity = -0.015;
		const jumpForce = 0.38;
		const trampForce = 0.75;
		const moveSpeed = 0.22;
		let isGrounded = false;
		const keys = {
			w: false,
			a: false,
			s: false,
			d: false,
			space: false
		};

		const parseInput = (code, val) => {
			if (code === 'KeyW' || code === 'ArrowUp') keys.w = val;
			if (code === 'KeyA' || code === 'ArrowLeft') keys.a = val;
			if (code === 'KeyS' || code === 'ArrowDown') keys.s = val;
			if (code === 'KeyD' || code === 'ArrowRight') keys.d = val;
			if (code === 'Space') keys.space = val;
		};

		window.addEventListener('keydown', (e) => {
			parseInput(e.code, true);

			if (e.code === 'KeyP') {
				isFirstPerson = !isFirstPerson;
				player.visible = !isFirstPerson;
			}
		});

		window.addEventListener('keyup', (e) => parseInput(e.code, false));

		function hitCheck() {
			const px = player.position.x;
			const py = player.position.y;
			const pz = player.position.z;
			const hs = playerSize / 2;
			for (let p of platforms) {
				if (px + hs > p.x - p.w / 2 && px - hs < p.x + p.w / 2 &&
					py + hs > p.y - p.h / 2 && py - hs < p.y + p.h / 2 &&
					pz + hs > p.z - p.d / 2 && pz - hs < p.z + p.d / 2) {
					if (p.goal) {
						currentLevelIndex = (currentLevelIndex + 1) % levels.length;
						buildStage(currentLevelIndex);
						return false;
					}
					return true;
				}
			}
			return false;
		}

		function gameLoop() {
			requestAnimationFrame(gameLoop);

			const zOffset = Math.sin(currentLevelIndex * 0.7) * 10;
			dirLight.position.set(player.position.x + 25, player.position.y + 60, player.position.z + 15 + zOffset);

			dirLight.intensity = 0.85;
			scene.background.copy(defaultSkyColor);
			scene.fog.color.copy(defaultSkyColor);

			velocity.y += gravity;
			velocity.x = 0;
			velocity.z = 0;

			if (controls.isLocked) {
				const camDirection = new THREE.Vector3();
				camera.getWorldDirection(camDirection);
				camDirection.y = 0;
				camDirection.normalize();

				const camSide = new THREE.Vector3();
				camSide.crossVectors(camDirection, new THREE.Vector3(0, 1, 0)).normalize();

				let moveX = 0;
				let moveZ = 0;

				if (keys.w) moveZ += 1.5;
				if (keys.s) moveZ -= 1.5;
				if (keys.a) moveX -= 1.5;
				if (keys.d) moveX += 1.5;

				const relativeMove = new THREE.Vector3();
				relativeMove.addScaledVector(camDirection, moveZ * moveSpeed);
				relativeMove.addScaledVector(camSide, moveX * moveSpeed);

				velocity.x = relativeMove.x;
				velocity.z = relativeMove.z;

				if (keys.space && isGrounded) {
					velocity.y = jumpForce;
					isGrounded = false;
				}

				player.position.x += velocity.x;
				if (hitCheck()) player.position.x -= velocity.x;

				player.position.z += velocity.z;
				if (hitCheck()) player.position.z -= velocity.z;

				player.position.y += velocity.y;

				isGrounded = false;
				if (hitCheck()) {
					if (velocity.y < 0) isGrounded = true;
					player.position.y -= velocity.y;
					velocity.y = 0;
				}
			}

			if (isFirstPerson) {
				camera.position.set(player.position.x, player.position.y + 0.6, player.position.z);
			} else {
				const camDirection = new THREE.Vector3();
				camera.getWorldDirection(camDirection);

				const targetCamPos = new THREE.Vector3()
					.copy(player.position)
					.addScaledVector(camDirection, -14);
				targetCamPos.y += 5.0;

				camera.position.copy(targetCamPos);
			}

			for (let h of hazards) {
				if (player.position.distanceTo(h.mesh.position) < 1.4) {
					player.position.set(0, 3, 0);
					velocity.set(0, 0, 0);
				}
			}

			for (let t of trampolines) {
				const px = player.position.x;
				const py = player.position.y;
				const pz = player.position.z;
				if (px + 0.5 > t.x - t.w / 2 && px - 0.5 < t.x + t.w / 2 &&
					py + 0.5 > t.y - t.h / 2 && py - 0.5 < t.y + t.h / 2 &&
					pz + 0.5 > t.z - t.d / 2 && pz - 0.5 < t.z + t.d / 2) {
					velocity.y = trampForce;
				}
			}

			if (player.position.y < -25) {
				player.position.set(0, 3, 0);
				velocity.set(0, 0, 0);
			}

			renderer.render(scene, camera);
		}

		buildStage(0);
		gameLoop();

		window.addEventListener('resize', () => {
			camera.aspect = window.innerWidth / window.innerHeight;
			camera.updateProjectionMatrix();
			renderer.setSize(window.innerWidth, window.innerHeight);
		});
	</script>
