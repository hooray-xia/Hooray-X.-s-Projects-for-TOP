        keyCode.buffer,
        'AES-GCM',
        false,
        ['decrypt'],
    ).then((result) => {
        return result;
    });
    
    const dec = await crypto.subtle.decrypt(
        {
            name: "AES-GCM",
            iv: iv
        },
        key,
        (new Uint8Array(message.split(',')))
    ).then(result => {
        return result;
    });
    
    const decArr = [...(new Uint8Array(dec))];
    let msg = '';
    for (let i = 0; i < decArr.length; i ++) {
        msg += String.fromCharCode(decArr[i]);
    }
    
    return msg;
}

    

window.startUp = async function() {
    const c = await decode(enc, window.prompt('Password:'))
    
    const win = window.open('', '_blank', `popup,width=${window.innerWidth},height=${window.innerHeight}`);
    win.document.open();
    win.document.write(c);
    win.document.close();
    window.addEventListener('message', e => {
        if (e.data === 'crash') win.close();
    });
    window.focus();
};
